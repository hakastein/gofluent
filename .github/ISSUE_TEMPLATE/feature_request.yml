name: Feature request or change
description: Suggest an enhancement or a behavioral change
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do, and where does gofluent fall short today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: false
  - type: textarea
    id: reference
    attributes:
      label: fluent.js / ECMA-402 reference
      description: >
        gofluent deliberately follows fluent.js and ECMA-402 `Intl.*` behavior.
        If your request concerns parsing or formatting, please link the
        corresponding upstream behavior so we can keep parity.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
