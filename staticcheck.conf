# Staticcheck configuration — https://staticcheck.dev/docs/configuration/
#
# ST1018 ("string literal contains Unicode format character") is disabled
# project-wide. gofluent is a bidirectional-text library that intentionally
# embeds the Unicode isolation characters U+2068 (FIRST STRONG ISOLATE) and
# U+2069 (POP DIRECTIONAL ISOLATE) in source and test data — they are domain
# values, not stray invisible characters, so the check would only add noise.
checks = ["all", "-ST1018"]
